<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的第一个页面</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #333;
        }
        header {
            background: rgba(255,255,255,0.9);
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
        .container {
            padding: 40px;
            text-align: center;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin: 20px auto;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #4facfe;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #3a8be0;
        }
        footer {
            text-align: center;
            padding: 15px;
            font-size: 14px;
            color: #fff;
        }
    </style>
</head>
<body>

<header>
    🌐 我的网页
</header>

<div class="container">
    <div class="card">
        <h2>欢迎！</h2>
        <p>这是一个简单的 HTML 示例页面。</p>
        <button onclick="showMessage()">点我试试</button>
    </div>
</div>

<footer>
    © 2026 我的网页
</footer>

<script>
    function showMessage() {
        alert("你好！欢迎来到这个页面 😄");
    }
</script>

</body>
</html>
